<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meesho Auto Lister AI</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Main View -->
        <div id="mainView" class="view">
            <header class="app-header">
                <div class="brand-small">
                    <div class="logo-circle-s">M</div>
                    <span>Meesho Lister AI</span>
                </div>
            </header>

            <nav class="tabs">
                <button class="tab-btn active" data-tab="create">Create</button>
                <button class="tab-btn" data-tab="history">History</button>
                <button class="tab-btn" data-tab="settings">Settings</button>
            </nav>

            <main class="tab-content">
                <!-- Create Tab -->
                <div id="createTab" class="tab-pane active">
                    <div class="stepper">
                        <div class="step active" data-step="1">1</div>
                        <div class="step-line"></div>
                        <div class="step" data-step="2">2</div>
                        <div class="step-line"></div>
                        <div class="step" data-step="3">3</div>
                    </div>

                    <!-- Step 1: Upload -->
                    <div id="step1" class="step-view active">
                        <div class="upload-area" id="dropZone">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9C27B0" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                            <p>Drag images or <span>Browse</span></p>
                            <input type="file" id="fileInput" multiple hidden accept="image/*">
                        </div>
                        <div id="imagePreviewGrid" class="image-grid"></div>
                        <div class="actions">
                            <button id="scanBtn" class="btn btn-primary w-full" disabled>
                                Scan Form & Analyze
                            </button>
                        </div>
                    </div>

                    <!-- Step 2: Review -->
                    <div id="step2" class="step-view">
                        <div class="section-header">
                            <h3>AI Analysis Results</h3>
                            <span id="fieldsCount" class="badge">0 Fields</span>
                        </div>
                        <div id="analysisForm" class="analysis-form">
                            <!-- Dynamic Inputs -->
                        </div>
                        <div class="actions">
                            <button id="backTo1" class="btn btn-ghost">Back</button>
                            <button id="startFillBtn" class="btn btn-primary flex-1">Auto Fill Now</button>
                        </div>
                    </div>

                    <!-- Step 3: Progress -->
                    <div id="step3" class="step-view">
                        <div class="progress-container">
                            <div class="progress-header">
                                <span id="currentField">Initializing...</span>
                                <span id="progressPercent">0%</span>
                            </div>
                            <div class="progress-bar">
                                <div id="progressBarFill" class="fill"></div>
                            </div>
                        </div>
                        <div id="fillLog" class="fill-log"></div>
                        <div class="actions">
                            <button id="finishBtn" class="btn btn-primary w-full hidden">Done</button>
                            <button id="cancelFillBtn" class="btn btn-outline w-full">Stop Filling</button>
                        </div>
                    </div>
                </div>

                <!-- History Tab -->
                <div id="historyTab" class="tab-pane">
                    <div id="historyList" class="history-list">
                        <!-- History Items -->
                    </div>
                </div>

                <!-- Settings Tab -->
                <div id="settingsTab" class="tab-pane">
                    <div class="settings-group">
                        <label>Automation Speed</label>
                        <select id="autoSpeed">
                            <option value="slow">Careful (Slow)</option>
                            <option value="medium" selected>Balanced</option>
                            <option value="fast">Turbo (Fast)</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label>AI Precision</label>
                        <select id="aiModel">
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                        </select>
                    </div>
                </div>
            </main>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
